---
- name: "Full Infrastructure Deploy: App, DB, Monitoring"
  hosts: all
  become: yes
  vars:
    # Твой подтвержденный репозиторий
    repo_url: 'https://github.com/yasechkaa/task7.git'

  tasks:
    - name: "1. Cleanup: Free ports 80/443"
      shell: |
        docker stop $(docker ps -aq) || true
        fuser -k 80/tcp || true
        fuser -k 443/tcp || true
      ignore_errors: yes

    - name: "2. Install k3s (Lightweight)"
      shell: 'curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik --disable servicelb" sh -'
      args:
        creates: /usr/local/bin/k3s

    - name: "3. Wait for Cluster Ready"
      command: "/usr/local/bin/k3s kubectl wait --for=condition=Ready nodes --all --timeout=600s"

    - name: "4. Create Namespaces"
      shell: "/usr/local/bin/k3s kubectl create namespace {{ item }} --dry-run=client -o yaml | /usr/local/bin/k3s kubectl apply -f -"
      loop: [argocd, prod, db, monitoring]

    - name: "5. Install ArgoCD (Server-Side Apply)"
      command: "/usr/local/bin/k3s kubectl apply --server-side --force-conflicts -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml"

    - name: "6. Wait for ArgoCD Server"
      command: "/usr/local/bin/k3s kubectl wait --for=condition=Available deployment/argocd-server -n argocd --timeout=600s"

    - name: "7. Deploy Triple Applications (App, DB, Monitoring)"
      copy:
        dest: "/tmp/argocd-apps.yaml"
        content: |
          # --- Приложение Flask (App) ---
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: flask-app
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: '{{ repo_url }}'
              path: helm-charts/app
              targetRevision: HEAD
            destination:
              server: 'https://kubernetes.default.svc'
              namespace: prod
            syncPolicy:
              automated: {prune: true, selfHeal: true}
          ---
          # --- База данных (DB) ---
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: database
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: '{{ repo_url }}'
              path: helm-charts/db
              targetRevision: HEAD
            destination:
              server: 'https://kubernetes.default.svc'
              namespace: db
            syncPolicy:
              automated: {prune: true, selfHeal: true}
          ---
          # --- Мониторинг (Monitoring) ---
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: monitoring
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: '{{ repo_url }}'
              path: helm-charts/monitoring
              targetRevision: HEAD
            destination:
              server: 'https://kubernetes.default.svc'
              namespace: monitoring
            syncPolicy:
              automated: {prune: true, selfHeal: true}

    - name: "8. Apply All Applications to ArgoCD"
      command: "/usr/local/bin/k3s kubectl apply -f /tmp/argocd-apps.yaml"